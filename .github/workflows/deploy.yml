name: Deploy Shopee Seller Chatbot to Cloud Run

on:
  push:
    branches:
      - master

env:
  GCP_PROJECT_ID: fluted-environs-477507-i7
  GCP_REGION: asia-east1
  SERVICE_NAME: shopee-chatbot-service
  JOB_NAME: shopee-chatbot-crawler
  GAR_REPO_NAME: shopee-chatbot-repo

jobs:
  deploy:
    name: Build and Deploy to GCP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # --- 1. Deploy Chatbot Webhook Service ---
      - name: Build and Push Webhook Service Image
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

      - name: Deploy Webhook Service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          flags: '--allow-unauthenticated'
          env_vars: |
            ENV=prod
            MODEL_TYPE=anthropic
            BIGQUERY_PROJECT=${{ env.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
            LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }}

      # --- 2. Deploy Offline Crawler Job ---
      - name: Build and Push Crawler Job Image
        run: |
          JOB_IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO_NAME }}/${{ env.JOB_NAME }}:${{ github.sha }}"
          docker build -f crawler/Dockerfile.crawler -t $JOB_IMAGE_URI .
          docker push $JOB_IMAGE_URI

      - name: Deploy Crawler Job to Cloud Run
        run: |
          gcloud run jobs deploy ${{ env.JOB_NAME }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO_NAME }}/${{ env.JOB_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --set-env-vars "ENV=prod,MODEL_TYPE=anthropic,BIGQUERY_PROJECT=${{ env.GCP_PROJECT_ID }},GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            --max-retries 0 \
            --task-timeout 15m
